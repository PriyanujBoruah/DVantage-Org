<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Portal | BDExplorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f4f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; padding: 20px; }
        .card { border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: none; padding: 40px; width: 100%; max-width: 500px; transition: all 0.3s ease; }
        .form-label { font-size: 10px; text-transform: uppercase; font-weight: 700; color: #6c757d; margin-bottom: 4px; }
        .member-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .member-row:last-child { border-bottom: none; }
        .badge-admin { background: #e8f0fe; color: #0b57d0; font-size: 9px; }
        .badge-user { background: #f8f9fa; color: #6c757d; font-size: 9px; }
    </style>
</head>
<body>

    <div class="card shadow" id="main-card">
        <!-- Header Zone -->
        <div class="text-center mb-4">
            <div id="portal-icon" class="rounded-circle bg-dark text-white d-inline-flex align-items-center justify-content-center mb-3" style="width: 50px; height: 50px;">
                <i class="fas fa-bolt"></i>
            </div>
            <h3 class="fw-bold mb-1" id="portal-title">BDExplorer</h3>
            <p class="text-muted small" id="portal-subtitle">Workspace Management Portal</p>
        </div>

        <hr class="opacity-10 mb-4">

        <!-- CONTENT ZONES (Controlled by JS) -->
        <div id="loading-state" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>

        <!-- STATE 1: CREATE NEW ORGANIZATION -->
        <div id="create-state" style="display:none;">
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="create-name" class="form-control bg-light border-0" placeholder="Jane Doe">
                </div>
                <div class="col-6">
                    <label class="form-label">Org Name</label>
                    <input type="text" id="create-org" class="form-control bg-light border-0" placeholder="Acme Corp">
                </div>
            </div>
            <input type="email" id="create-email" class="form-control bg-light border-0 mb-3" placeholder="Email">
            <input type="password" id="create-password" class="form-control bg-light border-0 mb-4" placeholder="Password">
            <button class="btn btn-dark w-100 rounded-pill fw-bold py-2" onclick="handleCreate()">Provision Workspace</button>
        </div>

        <!-- STATE 2: JOIN EXISTING ORGANIZATION (Invite Link) -->
        <div id="join-state" style="display:none;">
            <div class="alert alert-primary border-0 small mb-4">
                <i class="fas fa-info-circle me-2"></i> You've been invited to join <b id="join-org-name">...</b>
            </div>
            <label class="form-label">Full Name</label>
            <input type="text" id="join-user-name" class="form-control bg-light border-0 mb-3" placeholder="Jane Doe">
            <input type="email" id="join-email" class="form-control bg-light border-0 mb-3" placeholder="Work Email">
            <input type="password" id="join-password" class="form-control bg-light border-0 mb-4" placeholder="Choose Password">
            <button class="btn btn-primary w-100 rounded-pill fw-bold py-2" onclick="handleJoin()">Join Organization</button>
        </div>

        <!-- STATE 3: ADMIN DASHBOARD -->
        <div id="admin-state" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="form-label">Team Members</span>
                <span class="badge bg-success" style="font-size: 9px;">Active Workspace</span>
            </div>
            <div id="team-list" class="bg-light rounded-4 mb-4" style="max-height: 200px; overflow-y: auto;">
                <!-- Team injected here -->
            </div>
            
            <label class="form-label">Secure Invite Link</label>
            <div class="input-group mb-3">
                <input type="text" id="invite-link-box" class="form-control form-control-sm border-0 bg-light" readonly>
                <button class="btn btn-dark btn-sm px-3" onclick="copyInvite()"><i class="fas fa-copy"></i></button>
            </div>
            <button class="btn btn-outline-danger w-100 rounded-pill fw-bold btn-sm py-2" onclick="handleLogout()">Sign Out</button>
        </div>

        <!-- STATE 4: SUCCESS/INFO -->
        <div id="info-state" style="display:none;" class="text-center">
            <i class="fas fa-check-circle text-success fa-3x mb-3"></i>
            <h5 class="fw-bold" id="info-title">Success!</h5>
            <p class="small text-muted" id="info-body">Process complete.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const supabaseUrl = 'https://xaomobwzmosdeiykrtnh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhhb21vYnd6bW9zZGVpeWtydG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjM3MzgsImV4cCI6MjA5MjA5OTczOH0.spcrtDZpSIbVUBAVa01xHg5qNRQC-jFa7vHYdlAI9vY';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const inviteOrgId = urlParams.get('org');

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            
            // 1. Are we in "Join" mode? (Someone clicked an invite link)
            if (inviteOrgId && !session) {
                showState('join');
                const { data } = await supabase.from('organizations').select('name').eq('id', inviteOrgId).single();
                if (data) document.getElementById('join-org-name').innerText = data.name;
                return;
            }

            // 2. If logged in, check role
            if (session) {
                const { data: profile } = await supabase.from('profiles').select('*, organizations(name)').eq('id', session.user.id).single();
                
                if (profile && profile.role === 'admin') {
                    showState('admin');
                    document.getElementById('portal-title').innerText = profile.organizations.name;
                    document.getElementById('invite-link-box').value = window.location.origin + window.location.pathname + '?org=' + profile.org_id;
                    loadTeam(profile.org_id);
                } else {
                    showState('info', "Access Restricted", "Please use the main application for data analysis. This portal is for Administrators.");
                }
                return;
            }

            // 3. Default: Create Org
            showState('create');
        }

        function showState(state, title, body) {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('create-state').style.display = (state === 'create' ? 'block' : 'none');
            document.getElementById('join-state').style.display = (state === 'join' ? 'block' : 'none');
            document.getElementById('admin-state').style.display = (state === 'admin' ? 'block' : 'none');
            document.getElementById('info-state').style.display = (state === 'info' ? 'block' : 'none');
            if (title) document.getElementById('info-title').innerText = title;
            if (body) document.getElementById('info-body').innerText = body;
        }

        window.handleCreate = async () => {
            const name = document.getElementById('create-name').value;
            const org = document.getElementById('create-org').value;
            const email = document.getElementById('create-email').value;
            const password = document.getElementById('create-password').value;

            showState('loading');
            const { data: auth, error: aErr } = await supabase.auth.signUp({ email, password });
            if (aErr) return alert(aErr.message);

            const { data: oData } = await supabase.from('organizations').insert([{ name: org }]).select().single();
            await supabase.from('profiles').insert([{ id: auth.user.id, org_id: oData.id, role: 'admin', full_name: name }]);
            
            showState('info', "Workspace Provisioned", "Your Admin account is ready. You can now log in to the main application.");
        };

        window.handleJoin = async () => {
            const name = document.getElementById('join-user-name').value;
            const email = document.getElementById('join-email').value;
            const password = document.getElementById('join-password').value;

            showState('loading');
            const { data: auth, error: aErr } = await supabase.auth.signUp({ email, password });
            if (aErr) return alert(aErr.message);

            await supabase.from('profiles').insert([{ id: auth.user.id, org_id: inviteOrgId, role: 'user', full_name: name }]);
            
            showState('info', "Joined Successfully", "Welcome to the team! You can now log in to the main application.");
        };

        async function loadTeam(orgId) {
            const { data } = await supabase.from('profiles').select('*').eq('org_id', orgId);
            const list = document.getElementById('team-list');
            list.innerHTML = data.map(m => `
                <div class="member-row px-3">
                    <div class="flex-grow-1 small fw-bold">${m.full_name}</div>
                    <span class="badge ${m.role === 'admin' ? 'badge-admin' : 'badge-user'} rounded-pill">${m.role}</span>
                </div>
            `).join('');
        }

        window.copyInvite = () => {
            navigator.clipboard.writeText(document.getElementById('invite-link-box').value);
            alert("Invite link copied!");
        };

        window.handleLogout = async () => {
            await supabase.auth.signOut();
            window.location.href = window.location.origin + window.location.pathname;
        };

        init();
    </script>
</body>
</html>
