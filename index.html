<!-- index.html (Standalone Onboarding App for Render) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Organization | BDExplorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f0f4f9; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif; }
        .card { border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: none; padding: 40px; width: 100%; max-width: 450px; }
    </style>
</head>
<body>

    <div class="card text-center" id="setup-card">
        <h3 class="fw-bold mb-1">Welcome to BDExplorer</h3>
        <p class="text-muted small mb-4">Let's set up your workspace.</p>
        
        <div id="loading" style="display:none;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted small">Configuring secure vault...</p>
        </div>

        <div id="form-area">
            <label class="form-label small fw-bold text-muted text-start w-100 uppercase" style="font-size: 10px;">Organization Name</label>
            <input type="text" id="org-name" class="form-control bg-light border-0 mb-3" placeholder="e.g., Acme Corp Analytics" required>
            
            <label class="form-label small fw-bold text-muted text-start w-100 uppercase" style="font-size: 10px;">Your Full Name</label>
            <input type="text" id="full-name" class="form-control bg-light border-0 mb-4" placeholder="Jane Doe" required>
            
            <button class="btn btn-dark w-100 fw-bold py-2 rounded-pill" onclick="createOrganization()">
                Create Organization & Proceed
            </button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://xaomobwzmosdeiykrtnh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhhb21vYnd6bW9zZGVpeWtydG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjM3MzgsImV4cCI6MjA5MjA5OTczOH0.spcrtDZpSIbVUBAVa01xHg5qNRQC-jFa7vHYdlAI9vY';

        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function createOrganization() {
            const orgName = document.getElementById('org-name').value.trim();
            const fullName = document.getElementById('full-name').value.trim();

            if (!orgName || !fullName) return alert("Please fill in all fields.");

            document.getElementById('form-area').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // 1. Get Logged In User
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                alert("You are not logged in. Please log in via the main app first.");
                return window.location.href = "YOUR_MAIN_APP_URL";
            }

            try {
                // 2. Create Organization
                const { data: orgData, error: orgError } = await supabase
                    .from('organizations')
                    .insert([{ name: orgName }])
                    .select()
                    .single();
                if (orgError) throw orgError;

                // 3. Create Admin Profile
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([{
                        id: session.user.id,
                        org_id: orgData.id,
                        role: 'admin',
                        full_name: fullName
                    }]);
                if (profileError) throw profileError;

                // 4. Redirect back to main app
                alert("Organization created successfully! You are the Admin.");
                window.location.href = "YOUR_MAIN_APP_URL"; // Change to your local/production URL

            } catch (err) {
                alert("Error: " + err.message);
                document.getElementById('form-area').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
